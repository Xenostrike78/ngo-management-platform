{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UGMT | {{ title }}</title>
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="{% static "/bootstrap/bootstrap.min.css" %}" />

    <!-- Dhruv CSS -->
    <link rel="stylesheet" href="{% static "NavbarStyle.css" %}" />
    <link rel="stylesheet" href="{% static "loginStyle.css" %}" />
    <link rel="stylesheet" href="{% static "forgetPasswordstyle.css" %}" />

    <!-- ReCAPTHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>
  <body>
    <!-- Top Logo Navbar -->
    <div id="dsNav" class="d-flex justify-content-between align-items-center">
      <a href="{% url 'home' %}" class="d-flex align-items-center">
        <img
          src="{% static "/images/logonavbar.gif" %}"
          alt="Bootstrap"
          width="100"
          height="100"
        />
        <span id="dsNavName">Unique Group of Mankind Trust</span>
      </a>
    </div>

    <!-- Form -->
    <div class="dsForm mt-5">
      <form method="POST" >
        {% csrf_token %}
        <div class="form-group">
          <label for="toggleSwitch" class="dsemaillabel">Email</label>
        </div>
        <div class="form-group" id="emailInput">
          <input
            style="box-shadow: 0px 0px 30px #cace91"
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>
        {% if notfound %}
          <div style="color: #ea748e;" id="phoneHelp" class="form-text">{{ notfound }}</div>
        {% endif %}
        <br>

        <!-- ReCAPTCHA -->
        <div class="g-recaptcha" data-sitekey="6Lf5zkYrAAAAAI2PxsJFTkHGjZZYTJ1v3jGBsZHV" style="margin-bottom: 20px"></div>

        <button type="submit" value="Submit" class="btn btn-primary">Send Mail</button>
      </form>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="{% static "/bootstrap/bootstrap.min.js" %}"></script>
    <!-- Dhruv Custom JS -->
    <script src="{% static "forgetPassword.js" %}"></script>
  </body>
</html>
