{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>Payment Page</title>
    <link rel="stylesheet" href="{% static "MemberShip_Style.css" %}">
    <link rel="icon" href="{% static "/images/TabLogo.png" %}?v=2" type="image/x-icon">
  </head>
  <body>
    <div class="card">
      <h1 class="title">Pay Membership Fees</h1>
      <small class="muted">To Renew Membership pay ₹200</small>
      <div class="btn_container">
        <button class="btn" id="rzp-button1">Pay</button>
      </div>
    </div>
    <form
      id="payment_form"
      action="{% url 'renewMembershipSuccess' token  %}"
      method="POST"
    >
      {% csrf_token %}
      <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id"/>
      <input type="hidden" name="razorpay_order_id" id="razorpay_order_id" />
      <input type="hidden" name="razorpay_signature" id="razorpay_signature" />
    </form>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      var options = {
        key: "{{ razorpay_key }}",
        amount: "{{ amount }}", 
        currency: "{{ currency }}",
        name: "UGMT",
        description: "Membership Fees",
        order_id: "{{ order_id }}", 
        timeout: 240,
        image: "{{ image }}",
        prefill: {
          name: "{{ request.user.name }}",
          email: "{{ request.user.email }}",
          contact: "{{ request.user.mobile }}",
        },
        handler: function (response) {
          document.getElementById("razorpay_payment_id").value =
            response.razorpay_payment_id;
          document.getElementById("razorpay_order_id").value =
            response.razorpay_order_id;
          document.getElementById("razorpay_signature").value =
            response.razorpay_signature;
          document.getElementById("payment_form").submit();
        },
        theme: {
          color: "#3399cc",
        },
        config: {
          display: {
            blocks: {
              card: {
                name: "Pay with Card",
                instruments: [
                  {
                    method: "card",
                  },
                ],
              },
              netbanking: {
                name: "Net Banking",
                instruments: [
                  {
                    method: "netbanking",
                  },
                ],
              },
              upi: {
                name: "Pay via UPI",
                instruments: [
                  {
                    method: "upi",
                  },
                ],
              },
            },
            hide: [
              {
                method: "wallet", // Hide wallet/payment methods like "Pay Later"
              },
              {
                method: "emi", // Hide EMI payment options
              },
              {
                method: "paylater", // Hide Pay Later options
              },
            ],
            sequence: ["block.upi", "block.card", "block.netbanking"],
            preferences: {
              show_default_blocks: false, // Should Checkout show its default blocks?
            },
          },
        },
      };
      var rzp1 = new Razorpay(options);
      document.getElementById("rzp-button1").onclick = function (e) {
        rzp1.open();
        e.preventDefault();
      };
    </script>

  </body>
</html>
