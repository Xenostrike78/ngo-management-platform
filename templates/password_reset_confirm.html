{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UGMT | Login</title>
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="{% static "/bootstrap/bootstrap.min.css" %}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>

    <!-- Dhruv CSS -->
    <link rel="stylesheet" href="{% static "NavbarStyle.css" %}" />
    <link rel="stylesheet" href="{% static "loginStyle.css" %}" />
  </head>
  <body>
    <!-- Top Logo Navbar -->
    <div id="dsNav" class="d-flex justify-content-between align-items-center">
      <a href="{% url 'home' %}" class="d-flex align-items-center">
        <img
          src="{% static "/images/logonavbar.gif" %}"
          alt="Bootstrap"
          width="100"
          height="100"
        />
        <span id="dsNavName">Unique Group of Mankind Trust</span>
      </a>
    </div>

    <!-- Form -->
    <div class="dsForm">
      <form method="POST" onsubmit="validatePasswords(event)">
        {% csrf_token %}
        <!-- Create Password -->
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Create New Password</label>
        <div class="eyeBox">
          <input required type="password" class="form-control" id="Password1" minlength="5" />
          <i class="fas fa-eye toggle-password" id="togglePassword1"></i>
        </div>
      </div>
      <!-- Confirm Password -->
      <div class="mb-3">
        <label for="exampleInputPassword2" class="form-label">Confirm New Password</label>
        <div class="eyeBox">
          <input required type="password" class="form-control" id="Password2" name="resetPassword" minlength="5"/>
          <i class="fas fa-eye toggle-password" id="togglePassword2"></i>
        </div>
      </div>
      <!-- submit -->
      <button type="submit" class="btn btn-primary">Change Passward</button>
      </form>
    </div>
    <!-- Bootstrap 5 JS -->
    <script src="{% static "/bootstrap/bootstrap.min.js" %}"></script>
    
    <!-- Dhruv Custom JS -->
    <script src="{% static "changePassword.js" %}?v=2"></script>
  </body>
</html>
