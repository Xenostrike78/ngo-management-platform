{% extends "userPanel/userBase.html" %}
{% load static %}

{% block title%} Notice {% endblock %}

{% block tabCss %} <link rel="stylesheet" href="{% static "genNoticeStyle.css" %}?v=8" /> {% endblock tabCss %}  

{% block content %}

    <!-- Heading -->
    <div class="changePage">
        <div class="flexByDS">
            <a href="{% url 'genNotice' %}"><button class="yo-btn active">Generate Notice</button></a>
            <a href="{% url 'genAlert' %}"><button class="yo-btn" >Generate Alert</button></a>
        </div>
    </div>
    <!-- Form -->
    <form id="noticeForm" method="POST">
      {% csrf_token %}
        <div class="mb-3">
            <label for="message" class="form-label">Notice</label>
            <textarea required name="noticeText" class="form-control" id="message" rows="5" placeholder="Type your message here..."></textarea>
        </div>
        <br>
        <div>
            <label for="btnSub" class="form-label" style="font-weight: 600;">Notice is being Generated By {{ request.user.name }}</label>
            <br>
            <button id="btnSub" style="width: 20%;" type="submit" class="btn btn-primary dhruvButton">Generate Notice</button>
        </div>
    </form>
    <br>
{% endblock content %}
