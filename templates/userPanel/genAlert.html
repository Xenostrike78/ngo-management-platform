{% extends "userPanel/userBase.html" %}
{% load static %}

{% block title%} Notice {% endblock %}
{% block tabCss %} <link rel="stylesheet" href="{% static "genAlertStyle.css" %}?v=7" /> {% endblock tabCss %}

{% block content %}
    <!-- Heading -->
    <div class="changePage">
        <div class="flexByDS">
            <a href="{% url 'genNotice' %}"><button class="yo-btn">Generate Notice</button></a>
            <a href="{% url 'genAlert' %}"><button class="yo-btn active" >Generate Alert</button></a>
        </div>
    </div>
    <!-- Form -->
    <form id="noticeForm" method="POST">
      {% csrf_token %}
        <div class="mb-3">
            <label for="message" class="form-label">Notice</label>
            <textarea required name="alertText" class="form-control" id="message" rows="5" placeholder="Type your message here..."></textarea>
        </div>
        <div class="mb-3">
            <label for="amt" class="form-label">Amount</label>
            <input required type="number" name="amount" class="form-control" id="amt">
        </div>
        <div class="mb-3">
            <label for="amt" class="form-label">Receiver Aadhar Number</label>
            <input required type="number" name="receiverAadhar" class="form-control" id="amt" maxlength="12" pattern="\d{10}" oninput="this.value = this.value.slice(0, 12)">
        </div>
        {% if error %}
          <div if="aadharHelp" class="form-text" style="color: #FF9966;">
            <b>{{ error }}</b>
          </div>
        {% endif %}
        <div class="mb-3">
            <label for="amt" class="form-label">Nominee Aadhar Number</label>
            <input required type="number" name="nomineeAadhar" class="form-control" id="amt" maxlength="12" pattern="\d{10}" oninput="this.value = this.value.slice(0, 12)">
        </div>
        <div class="mb-3">
            <label for="bankName" class="form-label">Bank Name</label>
            <input required type="text" name="bankName" class="form-control" id="bankName">
        </div>
        <div class="mb-3">
            <label for="upiId" class="form-label">UPI ID</label>
            <input required type="text" name="upiId" class="form-control" id="upiId" pattern="[a-zA-Z0-9.\-]+@[a-zA-Z0-9.\-]+" placeholder="e.g. example@upi">
        </div>
        <div class="mb-3">
            <label for="amtpermember" class="form-label">Amount Per Member</label>
            <input required type="number" name="amount/member" class="form-control" id="amtpermember">
        </div>
        <br>
        <div>
            <label for="btnSub" class="form-label" style="font-weight: 600;">Charity Alert is being Generated By {{ request.user.name }}</label>
            <br>
            <button id="btnSub" style="width: 20%;" type="submit" class="btn btn-primary dhruvButton">Generate Charity Alert</button>
        </div>
    </form>
    <br>
{% endblock content %}
